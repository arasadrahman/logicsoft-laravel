name: Deploy Logicsoft

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DEPLOY_HOST: 49.143.249.38
      DEPLOY_USER: logicsoft
      DEPLOY_PATH: /home/logicsoft/panel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Install deployment tools
        run: sudo apt-get update && sudo apt-get install -y sshpass lftp

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload project with SFTP
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          lftp -u "$DEPLOY_USER","$SSHPASS" sftp://"$DEPLOY_HOST" <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          mkdir -p $DEPLOY_PATH
          mirror -R \
            --delete \
            --verbose \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob node_modules/ \
            --exclude-glob tests/ \
            --exclude-glob .env \
            --exclude-glob storage/logs/ \
            --exclude-glob storage/framework/cache/ \
            --exclude-glob storage/framework/sessions/ \
            --exclude-glob storage/framework/views/ \
            --exclude-glob bootstrap/cache/*.php \
            ./ $DEPLOY_PATH
          bye
          EOF

      - name: Run remote Laravel commands
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          sshpass -e ssh "$DEPLOY_USER@$DEPLOY_HOST" <<'EOF'
          set -e
          cd /home/logicsoft/panel
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/logs
          mkdir -p bootstrap/cache
          composer update --no-interaction --prefer-dist --optimize-autoloader
          php artisan migrate --force
          php artisan config:clear
          php artisan cache:clear
          php artisan view:clear
          php artisan route:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          EOF
