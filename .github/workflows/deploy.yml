name: Deploy Logicsoft

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DEPLOY_HOST: 49.143.249.38
      DEPLOY_USER: logicsoft
      DEPLOY_PATH: /home/logicsoft/panel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, mysql, sqlite3
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Install deployment tools
        run: sudo apt-get update && sudo apt-get install -y sshpass rsync

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync project to server
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          sshpass -e rsync -az --delete \
            --exclude ".env" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude "tests" \
            --exclude "storage/logs/*" \
            --exclude "storage/framework/cache/*" \
            --exclude "storage/framework/sessions/*" \
            --exclude "storage/framework/views/*" \
            --exclude "bootstrap/cache/*.php" \
            --rsync-path="mkdir -p $DEPLOY_PATH && rsync" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Run remote Laravel commands
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          sshpass -e ssh "$DEPLOY_USER@$DEPLOY_HOST" <<'EOF'
          set -e
          cd /home/logicsoft/panel
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/logs
          mkdir -p bootstrap/cache
          php artisan migrate --force
          php artisan config:clear
          php artisan cache:clear
          php artisan view:clear
          php artisan route:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          EOF
