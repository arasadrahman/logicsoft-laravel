name: Deploy Logicsoft

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DEPLOY_HOST: 49.143.249.38
      DEPLOY_USER: logicsoft
      DEPLOY_PATH: /home/logicsoft/panel
      DEPLOY_PROTOCOL: ftp
      DEPLOY_PORT: 21

    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          protocol: ${{ env.DEPLOY_PROTOCOL }}
          port: ${{ env.DEPLOY_PORT }}
          local-dir: ./
          server-dir: /home/logicsoft/panel/
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/tests/**
            **/.env
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/bootstrap/cache/*.php

      - name: Run remote Laravel commands
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          sshpass -e ssh "$DEPLOY_USER@$DEPLOY_HOST" <<'EOF'
          set -e
          cd /home/logicsoft/panel
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/logs
          mkdir -p bootstrap/cache
          composer update --no-interaction --prefer-dist --optimize-autoloader
          php artisan migrate --force
          php artisan config:clear
          php artisan cache:clear
          php artisan view:clear
          php artisan route:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          EOF
